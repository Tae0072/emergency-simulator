function interpolate(from, to, progress) {
  const p = Math.max(0, Math.min(1, progress));
  return {
    lat: from.lat + (to.lat - from.lat) * p,
    lng: from.lng + (to.lng - from.lng) * p,
  };
}

// ============================================================================
// Map 컴포넌트
// ============================================================================
const { useState, useEffect, useRef } = React;

function KakaoMap({ vehicleStates, signalStates, incidents, hospitals, fireStations }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef({ vehicles: {}, signals: {}, incidents: {}, hospitals: {}, stations: {} });

  // 지도 초기화
  useEffect(() => {
    if (!window.kakao || !window.kakao.maps) {
      mapRef.current.innerHTML = `
        <div class="flex items-center justify-center h-full text-yellow-500 p-8 text-center">
          <div>
            ⚠️ Kakao Map 로딩 실패. 카카오 디벨로퍼스에서 도메인 등록 확인 필요.<br/>
            현재 도메인: ${window.location.origin}
          </div>
        </div>`;
      return;
    }

    window.kakao.maps.load(() => {
      const options = {
        center: new window.kakao.maps.LatLng(35.158, 129.06),
        level: 9,
      };
      mapInstanceRef.current = new window.kakao.maps.Map(mapRef.current, options);

      // 병원 마커
      hospitals.forEach(h => {
        const marker = createCustomMarker(
          new window.kakao.maps.LatLng(h.lat, h.lng),
          `<div class="marker-hospital" title="${h.name}">🏥</div>`,
          mapInstanceRef.current
        );
        markersRef.current.hospitals[h.id] = marker;
      });

      // 소방서 마커 (NEW)
      fireStations.forEach(s => {
        const marker = createCustomMarker(
          new window.kakao.maps.LatLng(s.lat, s.lng),
          `<div class="marker-station" title="${s.name}">🚒</div>`,
          mapInstanceRef.current
        );
        markersRef.current.stations[s.id] = marker;
      });
    });
  }, []);

  // 차량 마커 갱신
  useEffect(() => {
    if (!mapInstanceRef.current || !window.kakao) return;
    Object.entries(vehicleStates).forEach(([vehicleId, state]) => {
      // 사라진 차량은 제거
      if (state.status === 'retired') {
        if (markersRef.current.vehicles[vehicleId]) {
          markersRef.current.vehicles[vehicleId].setMap(null);
          delete markersRef.current.vehicles[vehicleId];
        }
        return;
      }

      // 'available' 상태 (대기 중)인데 출동 명령 전인 경우는 표시 안 함
      if (state.status === 'standby_silent') {
        if (markersRef.current.vehicles[vehicleId]) {
          markersRef.current.vehicles[vehicleId].setMap(null);
          delete markersRef.current.vehicles[vehicleId];
        }
        return;
      }

      const existing = markersRef.current.vehicles[vehicleId];
      const position = new window.kakao.maps.LatLng(state.lat, state.lng);
      const isAmb = vehicleId.includes('AMB');
      const icon = isAmb ? '🚑' : '🏍️';
      const bg = state.status === 'dispatched' ? '#f97316' :   // 출동 중 (주황)
                 state.status === 'on_scene' ? '#eab308' :     // 현장 도착 (노랑)
                 state.status === 'transporting' ? '#ef4444' : // 이송 중 (빨강)
                 '#10b981';                                     // 대기 (녹색)
      const pulse = state.status === 'transporting' ? 'pulse-red' :
                    state.status === 'dispatched' ? 'pulse-orange' : '';
      const html = `<div class="marker-vehicle ${pulse}" style="background:${bg}">${icon}</div>`;

      if (existing) existing.setMap(null);
      markersRef.current.vehicles[vehicleId] = createCustomMarker(position, html, mapInstanceRef.current);
    });
  }, [vehicleStates]);

  // 신호등 마커
  useEffect(() => {
    if (!mapInstanceRef.current || !window.kakao) return;
    Object.entries(signalStates).forEach(([signalId, state]) => {
      const signal = SIGNALS.find(s => s.id === signalId);
      if (!signal) return;
      const existing = markersRef.current.signals[signalId];
      const position = new window.kakao.maps.LatLng(signal.lat, signal.lng);
      const bg = state === 'priority' ? '#10b981' : '#9ca3af';
      const pulse = state === 'priority' ? 'pulse-orange' : '';
      const html = `<div class="marker-signal ${pulse}" style="background:${bg}"></div>`;
      if (existing) existing.setMap(null);
      markersRef.current.signals[signalId] = createCustomMarker(position, html, mapInstanceRef.current);
    });
  }, [signalStates]);

  // 신고 위치 마커
  useEffect(() => {
    if (!mapInstanceRef.current || !window.kakao) return;
    Object.values(markersRef.current.incidents).forEach(m => m.setMap(null));
    markersRef.current.incidents = {};
    incidents.forEach((inc, idx) => {
      const position = new window.kakao.maps.LatLng(inc.lat, inc.lng);
      const html = `<div class="marker-incident pulse-red">!</div>`;
      markersRef.current.incidents[idx] = createCustomMarker(position, html, mapInstanceRef.current);
    });
  }, [incidents]);

  return <div ref={mapRef} className="w-full h-full bg-gray-800" />;
}

function createCustomMarker(position, html, map) {
  const content = document.createElement('div');
  content.innerHTML = html;
  const overlay = new window.kakao.maps.CustomOverlay({
    position: position,
    content: content,
    yAnchor: 0.5,
    xAnchor: 0.5,
  });
  overlay.setMap(map);
  return overlay;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

          className="px-4 py-2 bg-green-600 hover:bg-green-500 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded text-sm font-bold"
        >
          {isPlaying ? '⏸ 일시정지' : '▶ 재생'}
        </button>
        <button
          onClick={onStop}
          disabled={!currentScenario}
          className="px-4 py-2 bg-red-600 hover:bg-red-500 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded text-sm font-bold"
        >
          ⏹ 정지
        </button>

        <div className="w-px h-8 bg-gray-700"></div>

        <span className="text-xs text-gray-400">속도:</span>
        {[1, 2, 4, 8].map(s => (
          <button
            key={s}
            onClick={() => onSpeedChange(s)}
            className={`px-3 py-1 rounded text-xs ${
              speed === s ? 'bg-cyan-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
            }`}
          >
            {s}x
          </button>
        ))}

        <div className="w-px h-8 bg-gray-700"></div>

        <button
          onClick={onCustomReport}
          className="px-3 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded text-xs font-bold"
        >
          📞 직접 신고하기
        </button>
      </div>

      {currentScenario && (
        <div className="mt-2 text-xs text-gray-400 italic">
          💡 {currentScenario.description}
        </div>
      )}
    </div>
  );
}

// ============================================================================
// CustomReportModal
// ============================================================================
function CustomReportModal({ isOpen, onClose, onSubmit }) {
  const [district, setDistrict] = useState('해운대구');
  const [ktas, setKtas] = useState(1);
  const [keyword, setKeyword] = useState('숨을 안 쉬어요');

  if (!isOpen) return null;

  const districtCoords = {
    '해운대구': { lat: 35.1631, lng: 129.1635 },
    '사하구':   { lat: 35.1040, lng: 128.9740 },
    '부산진구': { lat: 35.1600, lng: 129.0530 },
    '동래구':   { lat: 35.2050, lng: 129.0840 },
    '강서구':   { lat: 35.2120, lng: 128.9810 },
  };

  const handleSubmit = () => {
    onSubmit({
      location: districtCoords[district],
      district,
      ktas,
      keyword,
    });
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div className="bg-gray-800 rounded-lg p-6 w-96">
        <h3 className="text-lg font-bold mb-4 text-white">📞 직접 신고 발생</h3>

        <div className="space-y-3">
          <div>
            <label className="text-xs text-gray-400 block mb-1">발생 지역</label>
            <select
              value={district}
              onChange={e => setDistrict(e.target.value)}
              className="w-full bg-gray-900 text-white rounded p-2 text-sm"
            >
              {Object.keys(districtCoords).map(d => <option key={d}>{d}</option>)}
            </select>
          </div>

          <div>
            <label className="text-xs text-gray-400 block mb-1">KTAS 등급</label>
            <div className="flex gap-2">
              {[1, 2, 3, 4, 5].map(k => (
                <button
                  key={k}
                  onClick={() => setKtas(k)}
                  className={`flex-1 py-2 rounded text-sm font-bold ${
                    ktas === k
                      ? k === 1 ? 'bg-red-600 text-white' :
                        k === 2 ? 'bg-orange-600 text-white' :
                        k === 3 ? 'bg-yellow-600 text-white' :
                        'bg-gray-600 text-white'
                      : 'bg-gray-700 text-gray-400 hover:bg-gray-600'
                  }`}
                >
                  {k}급
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs text-gray-400 block mb-1">신고 키워드 (자유 입력)</label>
            <input
              type="text"
              value={keyword}
              onChange={e => setKeyword(e.target.value)}
              className="w-full bg-gray-900 text-white rounded p-2 text-sm"
              placeholder="예: 숨을 안 쉬어요"
            />
          </div>
        </div>

        <div className="flex gap-2 mt-6">
          <button onClick={onClose} className="flex-1 py-2 bg-gray-700 text-white rounded text-sm">취소</button>
          <button onClick={handleSubmit} className="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white rounded text-sm font-bold">
            🚨 신고 발생
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// 차량 상태 초기화 함수 — 모든 차량을 'standby_silent' (소방서에 대기, 마커 숨김)
// ============================================================================
function getInitialVehicleStates() {
  const initial = {};
  AMBULANCES.forEach(v => {
    const station = FIRE_STATIONS.find(s => s.id === v.stationId);
    initial[v.id] = {
      lat: station.lat,
      lng: station.lng,
      stationLat: station.lat,
      stationLng: station.lng,
      status: 'standby_silent',  // 평상시엔 마커 안 보임 (출동 명령 받으면 표시)
    };
  });
  MOTORCYCLES.forEach(v => {
    const station = FIRE_STATIONS.find(s => s.id === v.stationId);
    initial[v.id] = {
      lat: station.lat,
      lng: station.lng,
      stationLat: station.lat,
      stationLng: station.lng,
      status: 'standby_silent',
    };
  });
  return initial;
}

// ============================================================================
// App — 메인 컴포넌트
// ============================================================================
function App() {
  const [currentScenario, setCurrentScenario] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [speed, setSpeed] = useState(2);
  const [currentTime, setCurrentTime] = useState(0);
  const [logs, setLogs] = useState([]);
  const [vehicleStates, setVehicleStates] = useState(getInitialVehicleStates);
  const [signalStates, setSignalStates] = useState({});
  const [incidents, setIncidents] = useState([]);
  const [activeIncidents, setActiveIncidents] = useState([]);
  const [poolLevel, setPoolLevel] = useState(1);
  const [showReportModal, setShowReportModal] = useState(false);

  // 자원 통계
  const resourceStats = {
    ambTotal: AMBULANCES.length,
    motoTotal: MOTORCYCLES.length,
    ambAvailable: Object.entries(vehicleStates).filter(([id, s]) =>
      id.includes('AMB') && (s.status === 'standby_silent' || s.status === 'available' || s.status === 'retired')
    ).length,
    ambDispatched: Object.entries(vehicleStates).filter(([id, s]) =>
      id.includes('AMB') && (s.status === 'dispatched' || s.status === 'on_scene' || s.status === 'transporting')
    ).length,
    motoAvailable: Object.entries(vehicleStates).filter(([id, s]) =>
      id.includes('MOTO') && (s.status === 'standby_silent' || s.status === 'available' || s.status === 'retired')
    ).length,
    motoDispatched: Object.entries(vehicleStates).filter(([id, s]) =>
      id.includes('MOTO') && (s.status === 'dispatched' || s.status === 'on_scene' || s.status === 'transporting')
    ).length,
    utilization: 0,
  };
  resourceStats.utilization = (resourceStats.ambDispatched + resourceStats.motoDispatched) /
                              (resourceStats.ambTotal + resourceStats.motoTotal);

  const handleSelectScenario = (scenario) => {
    handleStop();
    setCurrentScenario(scenario);
  };

  const handlePlayPause = () => {
    if (!currentScenario) return;
    setIsPlaying(prev => !prev);
  };

  const handleStop = () => {
    setIsPlaying(false);
    setCurrentTime(0);
    setLogs([]);
    setIncidents([]);
    setActiveIncidents([]);
    setSignalStates({});
    setPoolLevel(1);
    setVehicleStates(getInitialVehicleStates());
  };

  // 시간 진행 루프
  useEffect(() => {
    if (!isPlaying || !currentScenario) return;
    const interval = setInterval(() => {
      setCurrentTime(t => {
        const next = t + 1;
        if (next > currentScenario.duration) {
          setIsPlaying(false);
          return currentScenario.duration;
        }
        return next;
      });
    }, 1000 / speed);
    return () => clearInterval(interval);
  }, [isPlaying, currentScenario, speed]);

  // 시간 변화 시 이벤트 처리
  useEffect(() => {
    if (!currentScenario) return;
    const events = currentScenario.events.filter(e => e.time === currentTime);
    if (events.length === 0) return;

    events.forEach(event => {
      if (event.message) {
        setLogs(prev => [...prev, { time: event.time, message: event.message, detail: event.detail }]);
      }

      if (event.type === 'INCIDENT' && event.location) {
        setIncidents(prev => [...prev, event.location]);
        setActiveIncidents(prev => [...prev, { district: event.location.district, ktas: event.ktas }]);
      }

      // 출동 명령 — 차량을 'dispatched' 상태로, from/to 좌표 저장
      if (event.type === 'DISPATCH' && event.vehicleId && event.from && event.to) {
        setVehicleStates(prev => ({
          ...prev,
          [event.vehicleId]: {
            ...prev[event.vehicleId],
            status: 'dispatched',
            phase: 'to_incident',  // 환자 위치로 이동 중
            phaseStart: event.time,
            phaseEnd: event.arriveTime || (event.time + 25),
            from: event.from,
            to: event.to,
            lat: event.from.lat,
            lng: event.from.lng,
          }
        }));
      }

      // 이송 시작 — 환자 위치 → 병원
      if (event.type === 'TRANSPORT_START' && event.vehicleId && event.from && event.to) {
        setVehicleStates(prev => ({
          ...prev,
          [event.vehicleId]: {
            ...prev[event.vehicleId],
            status: 'transporting',
            phase: 'to_hospital',
            phaseStart: event.time,
            phaseEnd: event.arriveTime || (event.time + 45),
            from: event.from,
            to: event.to,
            lat: event.from.lat,
            lng: event.from.lng,
          }
        }));
      }

      // 차량 비활성화 (낙동강 시나리오 — 강서구 측 차량 자원 풀 복귀)
      if (event.type === 'DEACTIVATE' && event.vehicleId) {
        setVehicleStates(prev => ({
          ...prev,
          [event.vehicleId]: {
            ...prev[event.vehicleId],
            status: 'standby_silent',  // 마커 숨김 (자원 풀 복귀)
            lat: prev[event.vehicleId].stationLat,
            lng: prev[event.vehicleId].stationLng,
          }
        }));
      }

      // 인계 완료 → 차량 사라짐
      if (event.type === 'VEHICLE_RETIRE' && event.vehicleIds) {
        setVehicleStates(prev => {
          const next = { ...prev };
          event.vehicleIds.forEach(id => {
            if (next[id]) {
              next[id] = { ...next[id], status: 'retired' };  // 마커 제거
            }
          });
          return next;
        });
      }

      // 신호등
      if (event.type === 'SIGNAL_PRIORITY' && event.signalId) {
        setSignalStates(prev => ({ ...prev, [event.signalId]: 'priority' }));
      }
      if (event.type === 'SIGNAL_REVERT' && event.signalId) {
        setSignalStates(prev => ({ ...prev, [event.signalId]: 'normal' }));
      }

      if (event.type === 'POOL_LEVEL_UP') {
        setPoolLevel(event.level);
      }
    });
  }, [currentTime, currentScenario]);

  // 차량 위치 보간 — 매 시간 변화마다 이동 진행률에 따라 위치 갱신
  useEffect(() => {
    if (!isPlaying || !currentScenario) return;

    setVehicleStates(prev => {
      const updated = { ...prev };
      Object.entries(updated).forEach(([id, state]) => {
        if ((state.status === 'dispatched' || state.status === 'transporting')
            && state.from && state.to
            && state.phaseStart !== undefined && state.phaseEnd !== undefined) {
          const elapsed = currentTime - state.phaseStart;
          const totalDuration = state.phaseEnd - state.phaseStart;
          const progress = Math.max(0, Math.min(1, elapsed / totalDuration));
          const newPos = interpolate(state.from, state.to, progress);
          updated[id] = { ...state, lat: newPos.lat, lng: newPos.lng };

          // 도착 시 상태 업데이트
          if (progress >= 1) {
            if (state.status === 'dispatched' && state.phase === 'to_incident') {
              updated[id].status = 'on_scene';  // 현장 도착
            }
            // transporting 상태에서 도착하면 이벤트로 처리됨 (ARRIVE_HOSPITAL → VEHICLE_RETIRE)
          }
        }
      });
      return updated;
    });
  }, [currentTime]);

  // 사용자 직접 신고 (Custom Report)
  const handleCustomReport = (data) => {
    handleStop();

    const station = FIRE_STATIONS.find(s => s.district === data.district);
    if (!station) return;
    const ambs = AMBULANCES.filter(a => a.stationId === station.id);
    const motos = MOTORCYCLES.filter(m => m.stationId === station.id);

    const customScenario = {
      id: 99,
      title: `직접 신고 - ${data.district} ${data.ktas}급`,
      description: `사용자 직접 신고: "${data.keyword}"`,
      duration: 90,
      events: [
        { time: 0, type: 'INCIDENT', message: `📞 직접 신고: "${data.keyword}"`,
          location: { ...data.location, district: data.district }, ktas: data.ktas },
        { time: 1, type: 'STT_START', message: '🎙️ STT 분석 시작' },
        { time: 2, type: 'AI_CLASSIFY', message: `🤖 AI 분류: ${data.ktas}급, 자동 출동 ${data.ktas === 1 ? '실행' : '검토'}` },
      ]
    };

    if (ambs.length > 0) {
      customScenario.events.push({
        time: 3, type: 'DISPATCH',
        message: `🚑 ${ambs[0].id} ${station.name} 출발`,
        vehicleId: ambs[0].id,
        from: { lat: station.lat, lng: station.lng },
        to: data.location,
        arriveTime: 28,
      });
    }
    if (data.ktas <= 2 && motos.length > 0) {
      customScenario.events.push({
        time: 3, type: 'DISPATCH',
        message: `🏍️ ${motos[0].id} 출동 (선두)`,
        vehicleId: motos[0].id,
        from: { lat: station.lat, lng: station.lng },
        to: data.location,
        arriveTime: 25,
      });
    }
    if (data.ktas === 1 && motos.length > 1) {
      customScenario.events.push({
        time: 3, type: 'DISPATCH',
        message: `🏍️ ${motos[1].id} 출동 (후미)`,
        vehicleId: motos[1].id,
        from: { lat: station.lat, lng: station.lng },
        to: data.location,
        arriveTime: 27,
      });
    }

    customScenario.events.push(
      { time: 5, type: 'HOSPITAL_MATCH', message: '🏥 가장 가까운 병원 매칭', hospitalId: 'busan-baek' },
      { time: 28, type: 'ARRIVE_INCIDENT', message: '🚑 현장 도착', vehicleId: ambs[0]?.id },
      // 이송 시작 (환자 위치 → 부산백병원)
      { time: 35, type: 'TRANSPORT_START', message: '🚑 부산백병원 이송 시작',
        vehicleId: ambs[0]?.id,
        from: data.location,
        to: { lat: 35.1564, lng: 129.0608 },
        arriveTime: 80 }
    );

    if (data.ktas <= 2 && motos.length > 0) {
      customScenario.events.push(
        { time: 35, type: 'TRANSPORT_START', vehicleId: motos[0].id,
          from: data.location, to: { lat: 35.1564, lng: 129.0608 }, arriveTime: 78 }
      );
    }
    if (data.ktas === 1 && motos.length > 1) {
      customScenario.events.push(
        { time: 35, type: 'TRANSPORT_START', vehicleId: motos[1].id,
          from: data.location, to: { lat: 35.1564, lng: 129.0608 }, arriveTime: 82 }
      );
    }

    const retireIds = [ambs[0]?.id].filter(Boolean);
    if (data.ktas <= 2 && motos.length > 0) retireIds.push(motos[0].id);
    if (data.ktas === 1 && motos.length > 1) retireIds.push(motos[1].id);

    customScenario.events.push(
      { time: 80, type: 'ARRIVE_HOSPITAL', message: '🏥 부산백병원 도착',
        vehicleId: ambs[0]?.id, hospitalId: 'busan-baek' },
      { time: 85, type: 'VEHICLE_RETIRE', message: '✅ 인계 완료, 자원 풀 복귀', vehicleIds: retireIds },
      { time: 90, type: 'COMPLETE', message: '✅ 직접 신고 처리 완료' }
    );

    setCurrentScenario(customScenario);
    setIsPlaying(true);
  };

  return (
    <div className="h-screen flex flex-col bg-gray-900">
      <header className="bg-gray-800 border-b border-gray-700 px-6 py-3 flex justify-between items-center">
        <div>
          <h1 className="text-xl font-bold text-white">
            🚑 응급구조 통합 시스템 시뮬레이터 v2
          </h1>
          <p className="text-xs text-gray-400">부산 광역시 — 모두의 창업 데모 (소방서 출발 → 병원 이송)</p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-400">현재 시나리오</div>
          <div className="text-sm font-bold text-cyan-400">
            {currentScenario ? currentScenario.title : '선택되지 않음'}
          </div>
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden">
        <Sidebar
          resourceStats={resourceStats}
          activeIncidents={activeIncidents}
          poolLevel={poolLevel}
          currentTime={currentTime}
        />
        <div className="flex-1 relative">
          <KakaoMap
            vehicleStates={vehicleStates}
            signalStates={signalStates}
            incidents={incidents}
            hospitals={HOSPITALS}
            fireStations={FIRE_STATIONS}
          />
        </div>
        <LogPanel logs={logs} />
      </div>

      <Controls
        scenarios={SCENARIOS}
        currentScenario={currentScenario}
        isPlaying={isPlaying}
        speed={speed}
        onSelect={handleSelectScenario}
        onPlayPause={handlePlayPause}
        onStop={handleStop}
        onSpeedChange={setSpeed}
        onCustomReport={() => setShowReportModal(true)}
      />

      <CustomReportModal
        isOpen={showReportModal}
        onClose={() => setShowReportModal(false)}
        onSubmit={handleCustomReport}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
