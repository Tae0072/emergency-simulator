// ============================================================================
// 유틸: 좌표 보간 (출발 → 목적지 진행률 기반)
// ============================================================================
function interpolate(from, to, progress) {
  const p = Math.max(0, Math.min(1, progress));
  return {
    lat: from.lat + (to.lat - from.lat) * p,
    lng: from.lng + (to.lng - from.lng) * p,
  };
}

// ============================================================================
// Map 컴포넌트 (Kakao Map 래퍼)
// ============================================================================
const { useState, useEffect, useRef, useCallback } = React;

function KakaoMap({ vehicleStates, signalStates, incidents, hospitals }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef({ vehicles: {}, signals: {}, incidents: {}, hospitals: {} });

  // 지도 초기화
  useEffect(() => {
    if (!window.kakao || !window.kakao.maps) {
      mapRef.current.innerHTML = `
        <div class="flex items-center justify-center h-full text-yellow-500 p-8 text-center">
          <div>
            ⚠️ Kakao Map API 키가 설정되지 않았습니다.<br/>
            HTML 파일의 '05320b13b7093c7a2509a0de3b43a0eb' 부분을 본인 키로 교체하세요.<br/>
            발급: https://developers.kakao.com/
          </div>
        </div>`;
      return;
    }

    window.kakao.maps.load(() => {
      const options = {
        center: new window.kakao.maps.LatLng(35.158, 129.06), // 부산 중심
        level: 9, // 줌 레벨 (낮을수록 상세)
      };
      mapInstanceRef.current = new window.kakao.maps.Map(mapRef.current, options);

      // 병원 마커 초기 표시
      hospitals.forEach(h => {
        const marker = createCustomMarker(
          new window.kakao.maps.LatLng(h.lat, h.lng),
          `<div class="marker-hospital">🏥</div>`,
          mapInstanceRef.current
        );
        markersRef.current.hospitals[h.id] = marker;
      });
    });
  }, []);

  // 차량 마커 갱신
  useEffect(() => {
    if (!mapInstanceRef.current || !window.kakao) return;
    Object.entries(vehicleStates).forEach(([vehicleId, state]) => {
      const existing = markersRef.current.vehicles[vehicleId];
      const position = new window.kakao.maps.LatLng(state.lat, state.lng);
      const isAmb = vehicleId.includes('AMB');
      const icon = isAmb ? '🚑' : '🏍️';
      const bg = state.status === 'available' ? '#10b981' :
                 state.status === 'dispatched' ? '#f97316' :
                 state.status === 'transporting' ? '#ef4444' : '#6b7280';
      const pulse = state.status === 'transporting' ? 'pulse-red' :
                    state.status === 'dispatched' ? 'pulse-orange' : '';
      const html = `<div class="marker-vehicle ${pulse}" style="background:${bg}">${icon}</div>`;

      if (existing) {
        existing.setPosition(position);
        existing.getContent().innerHTML = html.replace(/^<div /, '<div ');
        // 단순화: 기존 오버레이 갱신
        existing.setMap(null);
        markersRef.current.vehicles[vehicleId] = createCustomMarker(position, html, mapInstanceRef.current);
      } else {
        markersRef.current.vehicles[vehicleId] = createCustomMarker(position, html, mapInstanceRef.current);
      }
    });
  }, [vehicleStates]);

  // 신호등 마커 갱신
  useEffect(() => {
    if (!mapInstanceRef.current || !window.kakao) return;
    Object.entries(signalStates).forEach(([signalId, state]) => {
      const signal = SIGNALS.find(s => s.id === signalId);
      if (!signal) return;
      const existing = markersRef.current.signals[signalId];
      const position = new window.kakao.maps.LatLng(signal.lat, signal.lng);
      const bg = state === 'priority' ? '#10b981' : '#9ca3af';
      const pulse = state === 'priority' ? 'pulse-orange' : '';
      const html = `<div class="marker-signal ${pulse}" style="background:${bg}"></div>`;

      if (existing) existing.setMap(null);
      markersRef.current.signals[signalId] = createCustomMarker(position, html, mapInstanceRef.current);
    });
  }, [signalStates]);

  // 신고 위치 마커
  useEffect(() => {
    if (!mapInstanceRef.current || !window.kakao) return;
    // 기존 신고 마커 제거
    Object.values(markersRef.current.incidents).forEach(m => m.setMap(null));
    markersRef.current.incidents = {};
    incidents.forEach((inc, idx) => {
      const position = new window.kakao.maps.LatLng(inc.lat, inc.lng);
      const html = `<div class="marker-incident pulse-red">!</div>`;
      markersRef.current.incidents[idx] = createCustomMarker(position, html, mapInstanceRef.current);
    });
  }, [incidents]);

  return <div ref={mapRef} className="w-full h-full bg-gray-800" />;
}

// 커스텀 오버레이 헬퍼
function createCustomMarker(position, html, map) {
  const content = document.createElement('div');
  content.innerHTML = html;
  const overlay = new window.kakao.maps.CustomOverlay({
    position: position,
    content: content,
    yAnchor: 0.5,
    xAnchor: 0.5,
  });
  overlay.setMap(map);
  // CustomOverlay는 getContent가 없으므로 직접 setMap으로만 처리
  return overlay;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ============================================================================
// App — 메인 컴포넌트
// ============================================================================
function App() {
  const [currentScenario, setCurrentScenario] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [speed, setSpeed] = useState(2);
  const [currentTime, setCurrentTime] = useState(0);
  const [logs, setLogs] = useState([]);
  const [vehicleStates, setVehicleStates] = useState({});
  const [signalStates, setSignalStates] = useState({});
  const [incidents, setIncidents] = useState([]);
  const [activeIncidents, setActiveIncidents] = useState([]);
  const [poolLevel, setPoolLevel] = useState(1);
  const [showReportModal, setShowReportModal] = useState(false);

  // 차량 상태 초기화
  useEffect(() => {
    const initial = {};
    [...AMBULANCES, ...MOTORCYCLES].forEach(v => {
      initial[v.id] = { lat: v.lat, lng: v.lng, status: 'available', origin: { lat: v.lat, lng: v.lng } };
    });
    setVehicleStates(initial);
  }, []);

  // 자원 통계
  const resourceStats = {
    ambTotal: AMBULANCES.length,
    motoTotal: MOTORCYCLES.length,
    ambAvailable: Object.entries(vehicleStates).filter(([id, s]) => id.includes('AMB') && s.status === 'available').length,
    ambDispatched: Object.entries(vehicleStates).filter(([id, s]) => id.includes('AMB') && s.status !== 'available').length,
    motoAvailable: Object.entries(vehicleStates).filter(([id, s]) => id.includes('MOTO') && s.status === 'available').length,
    motoDispatched: Object.entries(vehicleStates).filter(([id, s]) => id.includes('MOTO') && s.status !== 'available').length,
    utilization: 0,
  };
  resourceStats.utilization = (resourceStats.ambDispatched + resourceStats.motoDispatched) /
                              (resourceStats.ambTotal + resourceStats.motoTotal);

  // 시나리오 선택
  const handleSelectScenario = (scenario) => {
    handleStop();
    setCurrentScenario(scenario);
  };

  // 재생/일시정지
  const handlePlayPause = () => {
    if (!currentScenario) return;
    setIsPlaying(prev => !prev);
  };

  // 정지 (초기화)
  const handleStop = () => {
    setIsPlaying(false);
    setCurrentTime(0);
    setLogs([]);
    setIncidents([]);
    setActiveIncidents([]);
    setSignalStates({});
    setPoolLevel(1);
    // 차량 상태 초기화
    const initial = {};
    [...AMBULANCES, ...MOTORCYCLES].forEach(v => {
      initial[v.id] = { lat: v.lat, lng: v.lng, status: 'available', origin: { lat: v.lat, lng: v.lng } };
    });
    setVehicleStates(initial);
  };

  // 시간 진행 루프
  useEffect(() => {
    if (!isPlaying || !currentScenario) return;
    const interval = setInterval(() => {
      setCurrentTime(t => {
        const next = t + 1;
        if (next > currentScenario.duration) {
          setIsPlaying(false);
          return currentScenario.duration;
        }
        return next;
      });
    }, 1000 / speed);
    return () => clearInterval(interval);
  }, [isPlaying, currentScenario, speed]);

  // 시간 변화에 따른 이벤트 처리
  useEffect(() => {
    if (!currentScenario) return;
    const events = currentScenario.events.filter(e => e.time === currentTime);
    if (events.length === 0) return;

    events.forEach(event => {
      // 로그 추가
      if (event.message) {
        setLogs(prev => [...prev, { time: event.time, message: event.message, detail: event.detail }]);
      }

      // 신고 발생
      if (event.type === 'INCIDENT') {
        if (event.location) {
          setIncidents(prev => [...prev, event.location]);
          setActiveIncidents(prev => [...prev, { district: event.location.district, ktas: event.ktas }]);
        }
      }

      // 차량 디스패치
      if (event.type === 'DISPATCH' && event.vehicleId && event.destination) {
        setVehicleStates(prev => ({
          ...prev,
          [event.vehicleId]: {
            ...prev[event.vehicleId],
            status: 'dispatched',
            destination: event.destination,
            dispatchTime: event.time,
          }
        }));
      }

      // 차량 비활성화 (대기 해제)
      if (event.type === 'DEACTIVATE' && event.vehicleId) {
        setVehicleStates(prev => {
          const v = AMBULANCES.find(a => a.id === event.vehicleId) ||
                    MOTORCYCLES.find(m => m.id === event.vehicleId);
          return {
            ...prev,
            [event.vehicleId]: {
              ...prev[event.vehicleId],
              status: 'available',
              lat: v.lat,
              lng: v.lng,
            }
          };
        });
      }

      // 신호등 우선신호
      if (event.type === 'SIGNAL_PRIORITY' && event.signalId) {
        setSignalStates(prev => ({ ...prev, [event.signalId]: 'priority' }));
      }
      if (event.type === 'SIGNAL_REVERT' && event.signalId) {
        setSignalStates(prev => ({ ...prev, [event.signalId]: 'normal' }));
      }

      // 자원 풀 레벨
      if (event.type === 'POOL_LEVEL_UP') {
        setPoolLevel(event.level);
      }

      // 이송 시작
      if (event.type === 'TRANSPORT' && event.vehicleId) {
        setVehicleStates(prev => ({
          ...prev,
          [event.vehicleId]: { ...prev[event.vehicleId], status: 'transporting' }
        }));
      }

      // 도착
      if (event.type === 'ARRIVE_HOSPITAL' && event.hospitalId) {
        const hospital = HOSPITALS.find(h => h.id === event.hospitalId);
        if (hospital) {
          // 이송 중 차량들을 병원으로
          setVehicleStates(prev => {
            const updated = { ...prev };
            Object.keys(updated).forEach(id => {
              if (updated[id].status === 'transporting') {
                updated[id] = { ...updated[id], lat: hospital.lat, lng: hospital.lng };
              }
            });
            return updated;
          });
        }
      }
    });
  }, [currentTime, currentScenario]);

  // 차량 위치 보간 애니메이션 (출동 중인 차량들을 목적지로 이동)
  useEffect(() => {
    if (!isPlaying || !currentScenario) return;
    const moveDuration = 30; // 출동 후 30초 동안 이동

    setVehicleStates(prev => {
      const updated = { ...prev };
      Object.entries(updated).forEach(([id, state]) => {
        if (state.status === 'dispatched' && state.destination && state.dispatchTime !== undefined) {
          const elapsed = currentTime - state.dispatchTime;
          const progress = Math.min(1, elapsed / moveDuration);
          const newPos = interpolate(state.origin, state.destination, progress);
          updated[id] = { ...state, lat: newPos.lat, lng: newPos.lng };
          if (progress >= 1 && state.status === 'dispatched') {
            updated[id].status = 'transporting';
          }
        }
      });
      return updated;
    });
  }, [currentTime]);

  // 사용자 직접 신고
  const handleCustomReport = (data) => {
    handleStop();
    // 즉시 동적 시나리오 생성
    const customScenario = {
      id: 99,
      title: `직접 신고 - ${data.district} ${data.ktas}급`,
      description: `사용자 직접 신고: "${data.keyword}"`,
      duration: 40,
      events: [
        { time: 0, type: 'INCIDENT', message: `📞 직접 신고: "${data.keyword}"`,
          location: { ...data.location, district: data.district }, ktas: data.ktas },
        { time: 1, type: 'STT_START', message: '🎙️ STT 분석 시작' },
        ...(data.ktas === 1 ? [
          { time: 2, type: 'KEYWORD_TRIGGER', message: `🚨 [Layer 1] 1급 키워드 감지 → 즉시 출동` },
        ] : [
          { time: 3, type: 'AI_CLASSIFY', message: `🤖 AI 분류: ${data.ktas}급` },
        ]),
        // 가용 차량 자동 선택
        ...(() => {
          const ambs = AMBULANCES.filter(a => a.district === data.district);
          const motos = MOTORCYCLES.filter(m => m.district === data.district);
          const events = [];
          if (ambs.length > 0) {
            events.push({ time: 3, type: 'DISPATCH', message: `🚑 ${ambs[0].id} 출동`,
              vehicleId: ambs[0].id, destination: data.location });
          }
          if (data.ktas <= 2 && motos.length > 0) {
            events.push({ time: 3, type: 'DISPATCH', message: `🏍️ ${motos[0].id} 출동`,
              vehicleId: motos[0].id, destination: data.location });
          }
          if (data.ktas === 1 && motos.length > 1) {
            events.push({ time: 3, type: 'DISPATCH', message: `🏍️ ${motos[1].id} 출동 (후미)`,
              vehicleId: motos[1].id, destination: data.location });
          }
          return events;
        })(),
        { time: 35, type: 'COMPLETE', message: '✅ 직접 신고 처리 완료' },
      ]
    };
    setCurrentScenario(customScenario);
    setIsPlaying(true);
  };

  return (
    <div className="h-screen flex flex-col bg-gray-900">
      {/* 헤더 */}
      <header className="bg-gray-800 border-b border-gray-700 px-6 py-3 flex justify-between items-center">
        <div>
          <h1 className="text-xl font-bold text-white">
            🚑 응급구조 통합 시스템 시뮬레이터
          </h1>
          <p className="text-xs text-gray-400">부산 광역시 — 모두의 창업 데모</p>
        </div>
        <div className="text-right">
          <div className="text-xs text-gray-400">현재 시나리오</div>
          <div className="text-sm font-bold text-cyan-400">
            {currentScenario ? currentScenario.title : '선택되지 않음'}
          </div>
        </div>
      </header>

      {/* 본문 (3분할) */}
      <div className="flex-1 flex overflow-hidden">
        <Sidebar
          resourceStats={resourceStats}
          activeIncidents={activeIncidents}
          poolLevel={poolLevel}
          currentTime={currentTime}
        />
        <div className="flex-1 relative">
          <KakaoMap
            vehicleStates={vehicleStates}
            signalStates={signalStates}
            incidents={incidents}
            hospitals={HOSPITALS}
          />
        </div>
        <LogPanel logs={logs} />
      </div>

      {/* 하단 컨트롤 */}
      <Controls
        scenarios={SCENARIOS}
        currentScenario={currentScenario}
        isPlaying={isPlaying}
        speed={speed}
        onSelect={handleSelectScenario}
        onPlayPause={handlePlayPause}
        onStop={handleStop}
        onSpeedChange={setSpeed}
        onCustomReport={() => setShowReportModal(true)}
      />

      {/* 직접 신고 모달 */}
      <CustomReportModal
        isOpen={showReportModal}
        onClose={() => setShowReportModal(false)}
        onSubmit={handleCustomReport}
      />
    </div>
  );
}

// 렌더링
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
